name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # dummy values — build/lint don't connect to any service
      DATABASE_URL: postgresql://docchat:docchat@localhost:5432/docchat
      AUTH_SECRET: ci-build-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run build
